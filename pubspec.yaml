name: graduationlion
description: Graduation requirement checker and course recommendation app for Handong Global University students.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get: ^4.6.5
  flutter_slidable: ^3.0.0
  firebase_core: ^2.13.0
  firebase_auth: ^4.6.1
  cloud_firestore: ^4.7.1
  freezed_annotation: ^2.2.0
  google_sign_in: ^6.1.0
  dots_indicator: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.4
  freezed: ^2.3.4
  flutter_lints: ^2.0.0
  json_serializable: ^6.7.0
  mockito: ^5.4.1
  test: ^1.24.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
